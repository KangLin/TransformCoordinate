name: build

env:
  artifact_path: artifact_path
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TransformCoordinate_VERSION: "1.1.3"

on:
  push:
  pull_request:

jobs:
  ubuntu:
    uses: ./.github/workflows/ubuntu.yml

  msvc:
    uses: ./.github/workflows/msvc.yml

  mingw:
    if: true
    uses: ./.github/workflows/mingw.yml

  macos:
    uses: ./.github/workflows/macos.yml

  android:
    uses: ./.github/workflows/android.yml
    secrets: inherit

  doxygen:
    uses: ./.github/workflows/doxygen.yml
    if: false
    secrets: inherit

  deploy:
    #if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: [ubuntu, msvc, macos, android]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: clean test tag
        if: ${{ startsWith(github.ref, 'refs/heads/master') }}
        continue-on-error: true
        run: |
          gh release delete test_${{ github.ref_name }} -y --cleanup-tag

#      - name: Download all artifact
#        uses: actions/download-artifact@v4
#        with:
#          path: ${{ env.artifact_path }}

      - name: Download ubuntu
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.ubuntu.outputs.name }}
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Download msvc
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.msvc.outputs.name }}*
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Download mingw
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.mingw.outputs.name }}
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Download macos
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.macos.outputs.name }}*
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Download android
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.android.outputs.name }}*
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Download doxygen
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.doxygen.outputs.name }}
          path: ${{ env.artifact_path }}
          merge-multiple: true

      - name: Process configure file
        run: |
          git clone https://github.com/KangLin/RabbitCommon.git
          ./RabbitCommon/Install/MergeJsonFile.sh \
              "${{ github.workspace }}/update.json" \
              "${{ env.artifact_path }}" "${{ env.artifact_path }}/version.json"
          rm ${{ env.artifact_path }}/*.json

      - name: Add download
        run: |
          if [ -f ${{github.workspace}}/RabbitCommon/Script/RabbitCommon.sh ]; then
              source ${{github.workspace}}/RabbitCommon/Script/RabbitCommon.sh
              content=$(<"${{github.workspace}}/ChangeLog.md")
              if [[ $content =~ "v${{env.TransformCoordinate_VERSION}}" ]]; then
                echo "## [修改日志](https://github.com/KangLin/TransformCoordinate/blob/v${{env.TransformCoordinate_VERSION}}/ChangeLog.md)" >> ${{github.workspace}}/Release.md
                echo "" >> ${{github.workspace}}/Release.md
                get_section ${{github.workspace}}/ChangeLog.md >> ${{github.workspace}}/Release.md
                echo "" >> ${{github.workspace}}/Release.md
              fi
          else
              echo "Don't find RabbitCommon.sh"
          fi
          echo "-------------------------" >> ${{github.workspace}}/Release.md
          echo "" >> ${{github.workspace}}/Release.md
          export BRANCH_NAME=${{ github.ref_name }}
          if [ "${{ github.ref_name }}" == "master" ]; then
              export BRANCH_NAME=test_${{ github.ref_name }}
          fi
          echo "## 下载:" >> ${{github.workspace}}/Release.md
          echo "" >> ${{github.workspace}}/Release.md
          echo "|       | x86-64 (64-bit) | x86-32 (32-bit) | AArch64 (ARM64) | ARMv7 (32-bit) |备注|" >> ${{github.workspace}}/Release.md
          echo "|:-     | :-------------- | :-------------- | :-------------- | :------------- |:----|" >> ${{github.workspace}}/Release.md
          echo "|Windows|[EXE](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win64_msvc2022_64_qt6.10.3_Setup.exe)|[EXE](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win32_msvc2017_qt5.12.12_Setup.exe)|[EXE](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win64_msvc2022_arm64_qt6.10.3_Setup.exe)| |支持平台：[x86-32(Qt5)](https://doc.qt.io/qt-5/supported-platforms.html): <br> [x86-64(Qt6)](https://doc.qt.io/qt-6/supported-platforms.html)|" >> ${{github.workspace}}/Release.md
          echo "|Windows development library|[zip](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win64_msvc2022_64_development.zip)|[zip](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win32_msvc2017_development.zip)|[zip](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_win64_msvc2022_arm64_development.zip)| ||" >> ${{github.workspace}}/Release.md
          echo "|Android|[APK](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_android_x86_64_qt6.10.3_Release.apk) | |[APK](https://github.com/KangLin/TransformCoordinate/releases/download/${BRANCH_NAME}/TransformCoordinate_v${{env.TransformCoordinate_VERSION}}_android_arm64_v8a_qt6.10.3_Release.apk)| |Experiment.<br> [Supported platforms](https://doc.qt.io/qt-6/supported-platforms.html)|实验性的。<br> [支持平台](https://doc.qt.io/qt-6/supported-platforms.html)|" >> ${{github.workspace}}/Release.md
          echo "" >> ${{github.workspace}}/Release.md

      - name: Add artifact sha256sum in Release.md file
        run: |
          echo "文件签名:" >> ${{github.workspace}}/CheckSum.md
          echo "|File|Checksum(md5)|Checksum(sha256)|" >> ${{github.workspace}}/CheckSum.md
          echo "| :- |    :-       |:-|" >> ${{github.workspace}}/CheckSum.md
          cd ${{ env.artifact_path }}
          for file in *
          do
              echo "$file"
              if [ -f $file ]; then
                  if [ "${file##*.}" != "xml" ] && [ "${file##*.}" != "json" ]; then
                      SumMd5=`md5sum $file | awk '{print  "|", $2, "|", $1, "|"}'`
                      Sum256=`sha256sum $file | awk '{print $1, "|"}'`
                      echo "${SumMd5}${Sum256}" >> ${{github.workspace}}/CheckSum.md
                  fi
              else
                 rm -fr $file
              fi
          done
          #cat ${{github.workspace}}/CheckSum.md >> ${{github.workspace}}/Release.md
          echo "" >> ${{github.workspace}}/Release.md

      - name: Create Github Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: |
          gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --notes-file ${{github.workspace}}/Release.md
        
      - name: Upload To Github Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          gh release upload ${{ github.ref_name }} ${{github.workspace}}/${{ env.artifact_path }}/* ${{github.workspace}}/Release.md

      - name: Upload test tag To Github Release
        if: ${{ startsWith(github.ref, 'refs/heads/master') }}
        run: |
          gh release create test_${{ github.ref_name }} --prerelease --latest=false --title "Recently developed build - test_${{ github.ref_name }}" --notes-file ${{github.workspace}}/Release.md
          gh release upload test_${{ github.ref_name }} --clobber ${{github.workspace}}/${{ env.artifact_path }}/* ${{github.workspace}}/Release.md ${{github.workspace}}/CheckSum.md
